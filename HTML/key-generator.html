<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../CSS/reset.css">

<body>
    <header>
        <button id="goHome" class="goHome">
            <h1>GO HOME</h1>
        </button>
    </header>
    <main class="mainContainer keyContainer">
        <h2>GENERADOR DE CONTRASEÑAS SEGURAS</h2>
        <div class="slider-container">
            <input type="range" id="passwordLength" min="12" max="50" value="15"
                oninput="this.nextElementSibling.value = this.value">
            <output>15</output>
        </div>
        <button id="generateButton">GENERAR CONTRASEÑA 🔒</button>
        <div class="passwordBox">
            <input type="text" name="text" id="pass" placeholder="Clic en generar contraseña">
            <i id="copy">⧉</i>
        </div>
    </main>
    <footer>
        <nav id="navigation-footer">
            <ul>
                <li><a href="digital-clock.html"><img src="../IMG/reloj.png" alt="icono del dibujo de un reloj"></a>
                </li>
                <li><a href="key-generator.html"><img src="../IMG/candado.png" alt="icono del dibujo de un candado"></a>
                </li>
                <li><a href="short-list.html"><img src="../IMG/enlace.png" alt="icono del dibujo de un enlace"></a></li>
                <li><a href="weather.html"><img src="../IMG/nube.png" alt="icono del dibujo de una nube"></a></li>
            </ul>
        </nav>
    </footer>
    <script src="../main.js"></script>
    <script src="../JS/background.js"></script>
    <script src="../JS/key-generator.js"></script>
</body>
