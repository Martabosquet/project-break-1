<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de contraseñas</title>
    <link rel="stylesheet" href="../CSS/reset.css">
    <link rel="stylesheet" href="../CSS/root.css">
    <link rel="stylesheet" href="../CSS/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&family=Fredoka:wght@300;400;500;600;700&family=Varela+Round&display=swap"
        rel="stylesheet">

</head>

<body>
    <header>
        <button id="goHome" class="goHome">
            <h1>GO HOME</h1>
        </button>
    </header>
    <main class="mainContainer keyContainer">
        <h2>GENERADOR DE CONTRASEÑAS SEGURAS</h2>
        <div class="slider-container">
            <p class="pass-text">Longitud de la contraseña:</p>
            <input type="range" id="passwordLength" min="12" max="50" value="17"
                oninput="this.nextElementSibling.value = this.value">
            <output>17</output>
        </div>
        <button id="generateButton">GENERAR CONTRASEÑA 🔒</button>
        <div class="passwordBox">
            <input type="text" name="text" id="pass" placeholder="Clic en generar contraseña" readonly>
            <i id="copy">⧉</i>
        </div>
    </main>
    <footer>

    </footer>
    <script src="../main.js"></script>
    <script src="../JS/key-generator.js"></script>
</body>

</html>
