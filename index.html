<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD PB1</title>
    <link rel="stylesheet" href="/CSS/reset.css">
    <link rel="stylesheet" href="/CSS/root.css">
    <link rel="stylesheet" href="/CSS/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&family=Fredoka:wght@300;400;500;600;700&family=Varela+Round&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1 class="headerTitle">PROJECT BREAK 1</h1>
    </header>
    <main class="dashboard-container">

        <!-- RELOJ DIGITAL -->
        <div class="dashboard-card clockContainer">
            <h2>RELOJ DIGITAL</h2>
            <div id="clock"></div>
            <div id="date"></div>
            <p id="message" class="message"></p>
            <a href="/HTML/digital-clock.html" class="dashboard-link">VER MÁS DETALLES AQUÍ</a>
        </div>

        <!-- GENERADOR DE CONTRASEÑAS SEGURAS -->
        <div class="dashboard-card keyContainer">
            <h2>GENERADOR DE CONTRASEÑAS 🔐</h2>
            <div class="slider-container">
                <p class="pass-text">Longitud de la contraseña:</p>
                <input type="range" id="passwordLength" min="12" max="50" value="17"
                    oninput="this.nextElementSibling.value = this.value">
                <output>17</output>
            </div>
            <button id="generateButton">GENERAR CONTRASEÑA 🔒</button>
            <div class="passwordBox">
                <input type="text" name="text" id="pass" placeholder="Clic en generar contraseña" readonly>
                <i id="copy">⧉</i>
            </div>
            <a href="/HTML/key-generator.html" class="dashboard-link">VER MÁS DETALLES AQUÍ</a>
        </div>

        <!-- LINKS A OTRAS PÁGINAS -->
        <div class="dashboard-card">
            <h2>ENLACES ÚTILES 🔗</h2>
            <div class="linkStyle-index">
                <div class="inputEntries-index">
                    <input type="text" id="name-input" placeholder="Nombre de tu enlace" required>
                    <input type="text" id="url-input" required placeholder="Pega aquí la URL">
                    <button id="add-button">AÑADIR ENLACE</button>
                    <button id="clearButton">BORRAR TODOS LOS ENLACES</button>
                </div>
                <ul id="li-container" class="li-container-index"></ul>
            </div>
            <a href="/HTML/link-collect.html" class="dashboard-link">VER MÁS DETALLES AQUÍ</a>
        </div>

        <!-- ESTACIÓN METEOROLÓGICA -->
        <div class="dashboard-card">
            <h2>EL TIEMPO</h2>
            <div id="weather-container" class="weather-container-index">
                <div id="weather" class="weather-index"></div>
                <div id="weather-icon" class="weather-icon-index"></div>
                <div id="weather-data" class="weather-data-index"></div>
            </div>
            <div id="forecast" class="forecast-index"></div>
            <a href="/HTML/weather.html" class="dashboard-link">VER MÁS DETALLES AQUÍ</a>
        </div>
    </main>
    <footer>

    </footer>
    <script src="/main.js"></script>
    <script src="../JS/background.js"></script>
    <script src="./JS/digital-clock.js"></script>
    <script src="./JS/key-generator.js"></script>
    <script src="./JS/link-collect.js"></script>
    <script src="./JS/weather.js"></script>
</body>

</html>
